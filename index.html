<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>부티워크 & 풀 블룸 오늘의 문장 영수증</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* 영문은 Courier Prime, 한글은 Noto Sans KR이 적용되도록 설정 */
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        
        * {
            box-sizing: border-box;
        }

        body { 
            font-family: 'Courier Prime', 'Noto Sans KR', monospace; 
            background: #e0e0e0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            margin: 0;
            min-height: 100vh;
        }
        
        /* 컨트롤러 영역 */
        .controls { 
            width: 100%;
            max-width: 350px;
            display: flex; 
            justify-content: flex-end;
            margin-bottom: 20px; 
            gap: 10px;
        }

        button { 
            padding: 10px 15px; 
            cursor: pointer; 
            border: 1px solid #333; 
            background: #fff; 
            font-family: inherit;
            font-size: 13px;
            font-weight: 700;
            transition: all 0.2s;
        }

        button:hover {
            background: #333;
            color: #fff;
        }

        /* 상태 표시창 */
        .status-badge {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 10px;
            background-color: #ffeaea;
            color: #cc0000;
            margin-bottom: 15px;
            display: inline-block;
        }

        /* 영수증 영역 */
        #receipt { 
            width: 350px; 
            background: #fff; 
            padding: 40px 30px; 
            box-shadow: 0 0 15px rgba(0,0,0,0.15); 
            color: #000;
            position: relative;
        }

        /* 헤더 영역 */
        .header { 
            text-align: center; 
            margin-bottom: 25px; 
        }
        
        /* 타이틀이 한 줄에 들어오도록 폰트 크기 및 자간 조정 */
        .header p { 
            font-size: 20px; 
            margin: 0; 
            font-weight: 900; 
            letter-spacing: 0px;
            color: #000;
        }

        /* [영수증] 부분 비율 조정 */
        .header h1 { 
            margin: 15px 0 0 0; 
            font-size: 16px; 
            letter-spacing: 4px;
            font-weight: 700;
            color: #000;
        }
        
        /* 날짜/주문번호 영역 */
        .info { 
            font-size: 13px; 
            margin-bottom: 15px; 
            white-space: pre-line; 
            line-height: 1.6;
        }

        /* 구분선 스타일 */
        .divider { border-top: 2px dashed #000; margin: 15px 0; }
        .solid-divider { border-top: 2px solid #000; margin: 15px 0; }
        
        /* 본문 영역 */
        .content-area { margin: 20px 0; }
        
        /* ITEM -> 오늘의 문장, 폰트 크기 16px */
        .label { 
            font-weight: 700; 
            font-size: 16px; 
            margin-bottom: 10px; 
        }
        
        .value-sentence { 
            font-size: 14px; 
            line-height: 1.8; 
            margin-bottom: 15px; 
            word-break: keep-all; 
        }
        
        .value-source { 
            font-size: 12px; 
            text-align: right; 
            margin-bottom: 10px; 
        }
        
        /* 합계 (온도) 영역 - 아래 여백을 늘림 */
        .total-area { 
            display: flex; 
            justify-content: space-between; 
            font-weight: 700; 
            font-size: 16px; 
            margin: 20px 0 40px 0; 
        }

        /* 명언 영역 - 위아래 간격 균형 맞춤 */
        .quote-area {
            text-align: center;
            font-size: 14px;
            margin-bottom: 40px;
        }
        
        /* 바코드 영역 */
        .barcode-zone {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0 0 20px 0;
        }

        .barcode-stripes {
            display: flex;
            height: 45px;
            width: 80%;
            justify-content: center;
            align-items: stretch;
        }

        .stripe {
            background-color: #000;
            margin-right: 2px;
        }

        .barcode-number {
            font-family: 'Courier Prime', monospace;
            font-size: 12px;
            margin-top: 10px;
            letter-spacing: 3px;
            color: #000;
        }

        /* 푸터 영역 */
        .footer { 
            text-align: center; 
            font-size: 12px; 
            line-height: 1.8;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="controls">
        <button onclick="drawSentence()">새로 뽑기 ↻</button>
        <button onclick="saveImage()">이미지 저장 📥</button>
    </div>

    <div id="connection-status" class="status-badge" style="display: none;">연결 상태 대기 중</div>

    <div id="receipt">
        <div class="header">
            <p>BOOTY WURK & FULL BLOOM</p>
            <h1>[ 영 수 증 ]</h1>
        </div>
        
        <div class="info" id="receipt-date"></div>
        
        <div class="divider"></div>
        
        <div class="content-area">
            <div class="label">오늘의 문장</div>
            <div class="value-sentence" id="display-text">
                데이터를 불러오는 중입니다.
            </div>
            <div class="value-source" id="display-source">
                -
            </div>
        </div>
        
        <div class="solid-divider"></div>
        
        <div class="total-area">
            <span>TOTAL TEMP</span>
            <span id="dynamic-temp">20 도</span>
        </div>
        
        <!-- 동적으로 변하는 명언 영역 -->
        <div class="quote-area">
            <p id="dynamic-quote-text">"네 불안은 네 몫이지."</p>
        </div>

        <div class="barcode-zone">
            <div class="barcode-stripes" id="barcode-render"></div>
            <div class="barcode-number" id="barcode-num">00 00 00 00 00</div>
        </div>

        <div class="footer">
            <p>ⓒ 강비문</p>
        </div>
    </div>

    <script>
        // ==========================================
        // 본인의 웹 앱 URL을 붙여넣으세요!
        // ==========================================
        const SHEET_WEB_APP_URL = "https://script.google.com/macros/s/AKfycby07NHiXfPdLIODQOBbhHOB7tOxFtdlayfHR92VEf7HHvEibJlMFyYQ-zD1LcI5gKHa/exec";

        let sentenceDatabase = [
            {sentence: "피어남의 속도는 저마다 다르다. 조급해하지 말고 나의 계절을 믿을 것.", book: "풀 블룸", page: "21"}
        ];

        window.onload = function() {
            initBarcode();
            loadSheetData();
        };

        function loadSheetData() {
            const statusBadge = document.getElementById('connection-status');
            
            if (!SHEET_WEB_APP_URL || SHEET_WEB_APP_URL === "YOUR_GAS_WEB_APP_URL_HERE") {
                statusBadge.innerText = "임시 데이터 모드";
                statusBadge.style.display = "inline-block";
                scrambleData();
                return;
            }

            fetch(SHEET_WEB_APP_URL)
                .then(response => response.json())
                .then(data => {
                    if(data && data.length > 0) {
                        sentenceDatabase = data;
                        statusBadge.style.display = "none";
                    }
                    scrambleData();
                })
                .catch(error => {
                    statusBadge.innerText = "❌ 시트 연동 실패";
                    statusBadge.style.display = "inline-block";
                    scrambleData();
                });
        }

        function drawSentence() {
            scrambleData();
        }

        function scrambleData() {
            if (sentenceDatabase.length === 0) return;
            
            const randomIndex = Math.floor(Math.random() * sentenceDatabase.length);
            const picked = sentenceDatabase[randomIndex];

            // 1. 문장 및 출처 적용 (뒤에 붙던 " ." 제거)
            document.getElementById('display-text').innerText = picked.sentence;
            
            const bTitle = picked.book ? picked.book : "출처 미상";
            const pNum = picked.page ? `  •  ${picked.page} 권` : "";
            document.getElementById('display-source').innerText = `${bTitle}${pNum}`;

            // 2. 책 제목에 따른 온도 및 명언 자동 변경 로직
            let tempValue = "20 도";
            let quoteText = '"네 불안은 네 몫이지."'; // 기본값
            
            const cleanTitle = bTitle.replace(/\s+/g, ''); 
            
            if (cleanTitle.includes("부티워크")) {
                tempValue = "18 도";
                quoteText = '"네 불안은 네 몫이지."';
            } else if (cleanTitle.includes("풀블룸")) {
                tempValue = "22 도";
                quoteText = '"네 뜻대로 해, 신우."';
            }
            
            document.getElementById('dynamic-temp').innerText = tempValue;
            document.getElementById('dynamic-quote-text').innerText = quoteText;

            // 3. 날짜 및 시간 영역
            const now = new Date();
            const orderNum = String(Math.floor(1000 + Math.random() * 9000));
            const dateStr = now.toDateString(); 
            const timeStr = String(now.getHours()).padStart(2, '0') + ":" + String(now.getMinutes()).padStart(2, '0');
            
            // ORDER #XXXX 과 함께 날짜, 시간 출력
            document.getElementById('receipt-date').innerText = `ORDER #${orderNum}\n${dateStr} ${timeStr}`;

            // 4. 바코드 재설정
            initBarcode();
        }

        // 바코드 생성 로직
        function initBarcode() {
            const renderArea = document.getElementById('barcode-render');
            renderArea.innerHTML = '';
            let numSequence = '';

            for (let i = 0; i < 25; i++) {
                const thickness = Math.floor(Math.random() * 3) + 1;
                const stripeElement = document.createElement('div');
                stripeElement.className = 'stripe';
                stripeElement.style.width = thickness + 'px';
                renderArea.appendChild(stripeElement);

                numSequence += Math.floor(Math.random() * 10);
            }
            
            const formattedNum = numSequence.substring(0, 10).match(/.{1,2}/g).join(' ');
            document.getElementById('barcode-num').innerText = formattedNum;
        }

        // 캡쳐 및 이미지 저장 로직
        function saveImage() {
            const target = document.getElementById('receipt');
            
            html2canvas(target, {
                scale: 3, 
                backgroundColor: "#ffffff",
                useCORS: true
            }).then(canvas => {
                const downloadLink = document.createElement('a');
                downloadLink.download = 'bloom-piece-' + Date.now() + '.png';
                downloadLink.href = canvas.toDataURL('image/png');
                downloadLink.click();
            });
        }
    </script>
</body>
</html>
