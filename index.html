<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>부티워크 & 풀 블룸 오늘의 문장 영수증</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        
        * { box-sizing: border-box; }
        body { 
            font-family: 'Courier Prime', 'Noto Sans KR', monospace; 
            background: #e0e0e0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            margin: 0;
            min-height: 100vh;
        }
        .controls { width: 100%; max-width: 350px; display: flex; justify-content: flex-end; margin-bottom: 20px; gap: 10px; }
        button { padding: 10px 15px; cursor: pointer; border: 1px solid #333; background: #fff; font-family: inherit; font-size: 13px; font-weight: 700; transition: all 0.2s; }
        button:hover { background: #333; color: #fff; }
        .status-badge { font-size: 11px; padding: 3px 8px; border-radius: 10px; background-color: #ffeaea; color: #cc0000; margin-bottom: 15px; display: inline-block; }
        #receipt { width: 350px; background: #fff; padding: 40px 30px; box-shadow: 0 0 15px rgba(0,0,0,0.15); color: #000; position: relative; }
        .header { text-align: center; margin-bottom: 25px; }
        .header p { font-size: 20px; margin: 0; font-weight: 900; letter-spacing: 0px; color: #000; }
        .header h1 { margin: 15px 0 0 0; font-size: 16px; letter-spacing: 4px; font-weight: 700; color: #000; }
        .info { font-size: 13px; margin-bottom: 15px; white-space: pre-line; line-height: 1.6; }
        .divider { border-top: 2px dashed #000; margin: 15px 0; }
        .solid-divider { border-top: 2px solid #000; margin: 15px 0; }
        .content-area { margin: 20px 0; }
        .label { font-weight: 700; font-size: 16px; margin-bottom: 10px; }
        .value-sentence { font-size: 14px; line-height: 1.8; margin-bottom: 15px; word-break: keep-all; }
        .value-source { font-size: 12px; text-align: right; margin-bottom: 10px; }
        .total-area { display: flex; justify-content: space-between; font-weight: 700; font-size: 16px; margin: 20px 0 40px 0; }
        .quote-area { text-align: center; font-size: 14px; margin-bottom: 40px; }
        .barcode-zone { display: flex; flex-direction: column; align-items: center; margin: 0 0 20px 0; }
        .barcode-stripes { display: flex; height: 45px; width: 80%; justify-content: center; align-items: stretch; }
        .stripe { background-color: #000; margin-right: 2px; }
        .barcode-number { font-family: 'Courier Prime', monospace; font-size: 12px; margin-top: 10px; letter-spacing: 3px; color: #000; }
        .footer { text-align: center; font-size: 12px; line-height: 1.8; margin-top: 10px; }
        
        /* 로그인 오버레이 스타일 */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #e0e0e0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        #login-overlay h2 { font-family: 'Noto Sans KR', sans-serif; color: #333; margin-bottom: 20px;}
        #pwd-input { padding: 10px; font-size: 16px; margin-bottom: 15px; border: 1px solid #333; text-align: center; width: 200px; }
        #login-btn { padding: 10px 20px; font-size: 16px; cursor: pointer; border: 1px solid #333; background: #fff; font-weight: 700; transition: all 0.2s;}
        #login-btn:hover { background: #333; color: #fff; }
        #login-error { color: #cc0000; margin-top: 15px; font-size: 14px; display: none; font-weight: bold; }
    </style>
</head>
<body>

    <!-- 로그인 화면 오버레이 -->
    <div id="login-overlay">
        <h2>비밀번호를 입력하세요</h2>
        <input type="password" id="pwd-input" onkeypress="if(event.keyCode==13) attemptLogin();" placeholder="비밀번호">
        <button id="login-btn" onclick="attemptLogin()">입장하기</button>
        <div id="login-error">비밀번호가 틀렸습니다.</div>
    </div>

    <div class="controls">
        <button onclick="drawSentence()">새로 뽑기 ↻</button>
        <button onclick="saveImage()">이미지 저장 📥</button>
    </div>

    <div id="connection-status" class="status-badge" style="display: none;">연결 상태 대기 중</div>

    <div id="receipt">
        <div class="header">
            <p>BOOTY WURK & FULL BLOOM</p>
            <h1>[ 영 수 증 ]</h1>
        </div>
        
        <div class="info" id="receipt-date"></div>
        
        <div class="divider"></div>
        
        <div class="content-area">
            <div class="label">오늘의 문장</div>
            <div class="value-sentence" id="display-text">데이터를 불러오는 중입니다.</div>
            <div class="value-source" id="display-source">-</div>
        </div>
        
        <div class="solid-divider"></div>
        
        <div class="total-area">
            <span>TOTAL TEMP</span>
            <span id="dynamic-temp">20 도</span>
        </div>
        
        <div class="quote-area">
            <p id="dynamic-quote-text">"네 불안은 네 몫이지."</p>
        </div>

        <div class="barcode-zone">
            <div class="barcode-stripes" id="barcode-render"></div>
            <div class="barcode-number" id="barcode-num">00 00 00 00 00</div>
        </div>

        <div class="footer">
            <p>ⓒ 강비문</p>
        </div>
    </div>

    <script>
        // ==========================================
        // [중요] 앱스 스크립트 '새 배포' 후 나온 새 웹 앱 URL을 아래 따옴표 안에 꼭 붙여넣으세요!
        // ==========================================
        const SHEET_WEB_APP_URL = "https://script.google.com/macros/s/AKfycby82KzpZ8Q32Lqn9-tNbSlNlotwB7zCVE7BmGJ2O8CoKPACCoDNpqyL4drBobmPyCKN/exec";

        let sentenceDatabase = [];

        window.onload = function() {
            initBarcode();
            // 로그인 전이므로 loadSheetData()는 실행하지 않습니다.
        };

        function attemptLogin() {
            const pwd = document.getElementById('pwd-input').value;
            document.getElementById('login-error').style.display = 'none';
            
            if(!pwd) {
                document.getElementById('login-error').innerText = "비밀번호를 입력해주세요.";
                document.getElementById('login-error').style.display = 'block';
                return;
            }
            
            const statusBadge = document.getElementById('connection-status');
            statusBadge.innerText = "비밀번호 확인 중...";
            statusBadge.style.display = "inline-block";
            
            loadSheetData(pwd);
        }

        function loadSheetData(password) {
            const statusBadge = document.getElementById('connection-status');
            
            // 앱스 스크립트로 보낼 때 URL 끝에 비밀번호를 달아서 보냄
            const fetchUrl = SHEET_WEB_APP_URL + "?pwd=" + encodeURIComponent(password);

            fetch(fetchUrl)
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        // 비밀번호가 틀렸을 때
                        document.getElementById('login-error').innerText = data.error;
                        document.getElementById('login-error').style.display = 'block';
                        statusBadge.style.display = "none";
                    } else if (data && data.length > 0) {
                        // 로그인 성공 & 데이터 로드
                        sentenceDatabase = data;
                        document.getElementById('login-overlay').style.display = 'none'; 
                        statusBadge.style.display = "none";
                        scrambleData();
                    }
                })
                .catch(error => {
                    document.getElementById('login-error').innerText = "❌ 서버 연동 실패";
                    document.getElementById('login-error').style.display = 'block';
                    statusBadge.style.display = "none";
                });
        }

        function drawSentence() {
            scrambleData();
        }

        function scrambleData() {
            if (sentenceDatabase.length === 0) return;
            
            const randomIndex = Math.floor(Math.random() * sentenceDatabase.length);
            const picked = sentenceDatabase[randomIndex];

            document.getElementById('display-text').innerText = picked.sentence;
            
            const bTitle = picked.book ? picked.book : "출처 미상";
            const pNum = picked.page ? `  •  ${picked.page} 권` : "";
            document.getElementById('display-source').innerText = `${bTitle}${pNum}`;

            let tempValue = "20 도";
            let quoteText = '"네 불안은 네 몫이지."';
            
            const cleanTitle = bTitle.replace(/\s+/g, ''); 
            
            if (cleanTitle.includes("부티워크")) {
                tempValue = "18 도";
                quoteText = '"네 불안은 네 몫이지."';
            } else if (cleanTitle.includes("풀블룸")) {
                tempValue = "22 도";
                quoteText = '"네 뜻대로 해, 신우."';
            }
            
            document.getElementById('dynamic-temp').innerText = tempValue;
            document.getElementById('dynamic-quote-text').innerText = quoteText;

            const now = new Date();
            const orderNum = String(Math.floor(1000 + Math.random() * 9000));
            const dateStr = now.toDateString(); 
            const timeStr = String(now.getHours()).padStart(2, '0') + ":" + String(now.getMinutes()).padStart(2, '0');
            
            document.getElementById('receipt-date').innerText = `ORDER #${orderNum}\n${dateStr} ${timeStr}`;

            initBarcode();
        }

        function initBarcode() {
            const renderArea = document.getElementById('barcode-render');
            renderArea.innerHTML = '';
            let numSequence = '';

            for (let i = 0; i < 25; i++) {
                const thickness = Math.floor(Math.random() * 3) + 1;
                const stripeElement = document.createElement('div');
                stripeElement.className = 'stripe';
                stripeElement.style.width = thickness + 'px';
                renderArea.appendChild(stripeElement);

                numSequence += Math.floor(Math.random() * 10);
            }
            
            const formattedNum = numSequence.substring(0, 10).match(/.{1,2}/g).join(' ');
            document.getElementById('barcode-num').innerText = formattedNum;
        }

        function saveImage() {
            const target = document.getElementById('receipt');
            
            // 온도 정보 가져오기 (예: "18도"를 "18℃"로 변환)
const tempText = document.getElementById('dynamic-temp').innerText.replace(/\s+/g, '').replace('도', '℃');
            
            // 날짜를 보기 좋게 만들기 (예: 260719 - 2026년 7월 19일)
            const date = new Date();
            const yymmdd = date.getFullYear().toString().slice(-2) + 
                           (date.getMonth() + 1).toString().padStart(2, '0') + 
                           date.getDate().toString().padStart(2, '0');

            html2canvas(target, {
                scale: 3, 
                backgroundColor: "#ffffff",
                useCORS: true
            }).then(canvas => {
                const downloadLink = document.createElement('a');
                
                // 💡 미감 포인트: 영문+온도+날짜 조합으로 파일명을 깔끔하게!
                // 결과물 예시: Receipt_18도_260719.png
                downloadLink.download = `Temp_${tempText}_${yymmdd}.png`;
                
                downloadLink.href = canvas.toDataURL('image/png');
                downloadLink.click();
            });
        }
    </script>
</body>
</html>
